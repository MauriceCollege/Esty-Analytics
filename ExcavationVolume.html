<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Pole Holes - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Generation -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }

        .gm-style-iw { background: transparent !important; box-shadow: none !important; border: none !important; }
        .gm-style-iw-tc { display: none !important; }
        .gm-style-iw-d { background: white !important; border-radius: 16px !important; overflow: hidden !important; padding: 0 !important; color: black !important; }
        
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .glow-yellow { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-red-500/10 rounded-2xl border border-red-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter bg-gradient-to-br from-white to-slate-500 bg-clip-text text-transparent">
                        Utility Pole Holes
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="cloudStatus" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                        <p id="cloudStatusText" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest italic">Initializing Cloud Sync...</p>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col md:flex-row gap-2 items-stretch">
                <!-- Community & Contractor Inputs -->
                <div class="flex flex-col sm:flex-row gap-2">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="communityInput"
                            placeholder="Community (e.g. Ashton)"
                            class="w-full sm:w-40 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/30 transition-all text-sm shadow-xl"
                            oninput="updatePrefix()"
                        >
                        <div id="prefixDisplay" class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-tighter"></div>
                    </div>
                    <input 
                        type="text" 
                        id="contractorInput"
                        placeholder="Assign Contractor..."
                        class="w-full sm:w-48 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500/30 transition-all text-sm shadow-xl"
                    >
                </div>

                <div class="relative flex-1 md:w-64">
                    <input 
                        type="text" 
                        id="coordInput"
                        placeholder="Paste Coordinates or URL..."
                        class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3 pr-14 focus:outline-none focus:ring-2 focus:ring-red-500/30 transition-all text-sm shadow-xl"
                    >
                    <button 
                        onclick="addMarker()"
                        class="absolute right-2 top-1/2 -translate-y-1/2 p-2.5 bg-red-500 hover:bg-red-400 text-slate-950 rounded-xl transition-all shadow-lg active:scale-95"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- KPI Section -->
        <div id="kpiContainer" class="hidden bg-slate-900/50 border border-slate-800 p-6 rounded-[2.5rem] backdrop-blur-sm shadow-xl animate-in fade-in slide-in-from-top-4">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Operation Progress</h3>
                    <p id="kpiCounts" class="text-[10px] text-slate-400 font-bold uppercase mt-1">0 / 0 Holes Completed</p>
                </div>
                <div id="kpiPercent" class="text-3xl font-black text-yellow-400 tabular-nums">0%</div>
            </div>
            <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-800 p-0.5">
                <div id="kpiProgressBar" class="h-full bg-gradient-to-r from-red-500 to-yellow-400 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div id="errorBanner" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-5 py-4 rounded-2xl text-sm flex flex-col gap-1 items-start">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="errorMessage" class="font-bold"></span>
            </div>
            <p id="errorSubtitle" class="text-[10px] opacity-70 ml-7 uppercase tracking-wider font-bold"></p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Map View -->
            <div class="lg:col-span-3 relative bg-slate-900 rounded-[2.5rem] border border-slate-800 h-[650px] overflow-hidden shadow-2xl">
                <div id="mapLoader" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 bg-slate-950/80 backdrop-blur-sm z-20">
                    <div class="w-16 h-16 border-4 border-red-500/10 border-t-red-500 rounded-full animate-spin"></div>
                    <p class="mt-6 font-bold tracking-widest text-xs uppercase animate-pulse">Establishing Satellite Link...</p>
                </div>
                <div id="map" class="w-full h-full"></div>
            </div>

            <!-- Sidebar Inventory -->
            <div class="bg-slate-900/30 rounded-[2.5rem] border border-slate-800 flex flex-col h-[650px] overflow-hidden backdrop-blur-xl">
                <div class="p-6 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between">
                    <h2 class="font-black text-xs flex items-center gap-2 uppercase tracking-[0.2em] text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Hole Inventory
                    </h2>
                    <button onclick="generateReport()" class="flex items-center gap-1 text-[10px] font-black uppercase text-blue-400 hover:text-blue-300 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Excel
                    </button>
                </div>

                <div id="registryList" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- Dynamic List -->
                </div>

                <div id="statsFooter" class="hidden p-6 bg-slate-900/80 border-t border-slate-800">
                    <div class="flex items-center justify-between text-[10px] text-slate-500 font-black uppercase tracking-widest mb-3">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line></svg>
                            Fleet Totals
                        </div>
                        <span id="communityTag">GRID</span>
                    </div>
                    <div class="flex justify-between text-xs">
                        <span class="text-slate-500">Total Route Distance</span>
                        <span id="maxDistLabel" class="text-red-400 font-mono font-bold">0.00 km</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <footer class="flex flex-wrap items-center gap-6 px-4 py-2 text-[9px] text-slate-600 uppercase tracking-[0.3em] font-black border-t border-slate-900">
            <div class="flex items-center gap-2">
                <span id="sysIndicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                System <span id="sysStatus">Connecting</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="dbIndicator" class="w-2 h-2 rounded-full bg-slate-600"></span>
                Cloud <span id="dbStatus">Standby</span>
            </div>
            <div class="ml-auto opacity-50">
                UPH-PRO-v4.5
            </div>
        </footer>
    </div>

    <input type="file" id="imageInput" class="hidden" accept="image/*">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'uph-tracker-v4';
        
        let markers = [];
        let gMarkers = [];
        let googleMap = null;
        let unsubscribeHoles = null;
        const googleMapsKey = 'AIzaSyClVdsKzjqXr5cdi6H2bakxGj7QG40o1-o';
        const JAMAICA_CENTER = { lat: 18.1096, lng: -77.2975 };

        // Error helper
        function showGlobalError(msg, subtitle = "") {
            const banner = document.getElementById('errorBanner');
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorSubtitle').innerText = subtitle;
            banner.classList.remove('hidden');
            banner.classList.add('shake');
            setTimeout(() => {
                banner.classList.add('hidden');
                banner.classList.remove('shake');
            }, 5000);
        }

        // Community Logic
        window.updatePrefix = () => {
            const input = document.getElementById('communityInput').value.trim();
            const display = document.getElementById('prefixDisplay');
            if (input.length >= 2) {
                const prefix = input.substring(0, 3).toUpperCase();
                display.innerText = `${prefix}-H#`;
                return prefix;
            }
            display.innerText = '';
            return 'GEN';
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed:", err);
                showGlobalError("Cloud connection failed", err.message);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('dbIndicator').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                document.getElementById('dbStatus').innerText = 'Connected';
                document.getElementById('cloudStatus').className = "w-1.5 h-1.5 rounded-full bg-green-500";
                document.getElementById('cloudStatusText').innerText = "Cloud Synced";
                
                const holesRef = collection(db, 'artifacts', appId, 'public', 'data', 'holes');
                if (unsubscribeHoles) unsubscribeHoles();
                
                unsubscribeHoles = onSnapshot(holesRef, (snapshot) => {
                    markers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    markers.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                    renderRegistry();
                    updateMapMarkers();
                }, (err) => {
                    console.error("Snapshot Error:", err);
                    if (err.code === 'permission-denied') {
                        showGlobalError("Database Access Denied", "Contact Administrator.");
                    }
                });
            } else {
                document.getElementById('dbIndicator').className = "w-2 h-2 rounded-full bg-slate-600";
                document.getElementById('dbStatus').innerText = 'Standby';
            }
        });

        initAuth();

        // Map Integration
        window.initMap = () => {
            googleMap = new google.maps.Map(document.getElementById('map'), {
                center: JAMAICA_CENTER, zoom: 8.5,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                ],
                disableDefaultUI: false, mapTypeControl: true, streetViewControl: false
            });
            document.getElementById('mapLoader').classList.add('hidden');
            document.getElementById('sysIndicator').className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
            document.getElementById('sysStatus').innerText = 'Operational';
            updateMapMarkers();
        };

        // Actions
        window.addMarker = async () => {
            if (!auth.currentUser) {
                showGlobalError("Connection pending", "Please wait for cloud sync.");
                return;
            }

            const coordInput = document.getElementById('coordInput');
            const commInput = document.getElementById('communityInput').value.trim() || 'General';
            const contractorInput = document.getElementById('contractorInput').value.trim() || 'Unassigned';
            
            const robustRegex = /(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/;
            const match = coordInput.value.match(robustRegex);

            if (!match) {
                showGlobalError("Invalid Format", "Use 'latitude, longitude' format.");
                return;
            }

            const newLat = parseFloat(match[1]);
            const newLng = parseFloat(match[2]);

            // DUPLICATE CHECK
            const isDuplicate = markers.some(m => 
                Math.abs(m.lat - newLat) < 0.000001 && 
                Math.abs(m.lng - newLng) < 0.000001
            );

            if (isDuplicate) {
                showGlobalError("Duplicate Entry Detected", "These coordinates already exist in the inventory.");
                return;
            }

            const prefix = commInput.substring(0, 3).toUpperCase();
            const communityHoles = markers.filter(m => m.community === commInput);
            const maxNum = communityHoles.reduce((max, h) => {
                const match = h.uniqueId.match(/H(\d+)$/);
                const num = match ? parseInt(match[1]) : 0;
                return num > max ? num : max;
            }, 0);
            
            const nextNum = maxNum + 1;
            const uniqueId = `${prefix}-H${nextNum}`;

            const newHole = {
                community: commInput,
                contractor: contractorInput,
                uniqueId: uniqueId,
                lat: newLat,
                lng: newLng,
                image: null,
                digMethod: 'M',
                status: 'pending',
                createdAt: Date.now(),
                timestamp: new Date().toLocaleTimeString()
            };

            coordInput.value = '';
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'holes'), newHole);
            } catch (err) {
                showGlobalError("Save failed", err.message);
            }
        };

        window.deleteMarker = async (docId) => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'holes', docId);
            await deleteDoc(docRef);
        };

        window.toggleStatus = async (docId, current) => {
            if (!auth.currentUser) return;
            const next = current === 'complete' ? 'pending' : 'complete';
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'holes', docId);
            await updateDoc(docRef, { status: next });
        };

        window.toggleDigMethod = async (docId, method) => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'holes', docId);
            await updateDoc(docRef, { digMethod: method });
        };

        window.triggerUpload = (docId) => {
            window.pendingId = docId;
            document.getElementById('imageInput').click();
        };

        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file && window.pendingId) {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    if (!auth.currentUser) return;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'holes', window.pendingId);
                    try {
                        await updateDoc(docRef, { image: reader.result });
                    } catch (err) {
                        showGlobalError("Upload failed", err.message);
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        // EXCEL REPORT GENERATION
        window.generateReport = () => {
            const community = document.getElementById('communityInput').value.trim() || 'All Areas';
            const areaHoles = community === 'All Areas' ? markers : markers.filter(m => m.community === community);

            if (areaHoles.length === 0) {
                showGlobalError("No data available", "Add holes to the community before generating.");
                return;
            }

            const holeData = areaHoles.map(h => ({
                "Hole ID": h.uniqueId,
                "Community": h.community,
                "Contractor": h.contractor || "N/A",
                "Latitude": h.lat,
                "Longitude": h.lng,
                "Status": h.status === 'complete' ? 'DUG' : 'PENDING',
                "Dig Method": h.digMethod === 'M' ? 'Manual (M)' : 'Backhoe (B)',
                "Creation Time": h.timestamp
            }));

            const total = areaHoles.length;
            const dugCount = areaHoles.filter(h => h.status === 'complete').length;
            const manualCount = areaHoles.filter(h => h.digMethod === 'M').length;
            const backhoeCount = areaHoles.filter(h => h.digMethod === 'B').length;

            const summaryData = [
                ["FIELD OPERATION REPORT"],
                ["Community Target:", community],
                ["Total Holes Recorded:", total],
                [],
                ["COMPLETION STATISTICS"],
                ["Total Dug:", dugCount, ((dugCount/total)*100).toFixed(1) + "%"],
                ["Total Pending:", total - dugCount, (((total-dugCount)/total)*100).toFixed(1) + "%"],
                [],
                ["METHODOLOGY BREAKDOWN"],
                ["Manual (M):", manualCount, ((manualCount/total)*100).toFixed(1) + "%"],
                ["Backhoe (B):", backhoeCount, ((backhoeCount/total)*100).toFixed(1) + "%"],
                [],
                ["Report Timestamp:", new Date().toLocaleString()]
            ];

            const wb = XLSX.utils.book_new();
            const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, wsSummary, "Community Summary");

            const wsHoles = XLSX.utils.json_to_sheet(holeData);
            XLSX.utils.book_append_sheet(wb, wsHoles, "Contractor Hole Registry");

            const dateStr = new Date().toISOString().split('T')[0];
            const safeComm = community.replace(/[^a-z0-9]/gi, '_').toUpperCase();
            XLSX.writeFile(wb, `UPH_REPORT_${safeComm}_${dateStr}.xlsx`);
        };

        // Render Helpers
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function renderRegistry() {
            const list = document.getElementById('registryList');
            const kpi = document.getElementById('kpiContainer');
            const community = document.getElementById('communityInput').value.trim() || 'General';
            
            if (markers.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-10 text-center py-20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-600">Awaiting Operation Data</p></div>`;
                kpi.classList.add('hidden');
                document.getElementById('statsFooter').classList.add('hidden');
                return;
            }

            kpi.classList.remove('hidden');
            document.getElementById('statsFooter').classList.remove('hidden');
            document.getElementById('communityTag').innerText = community.toUpperCase();

            const completed = markers.filter(m => m.status === 'complete').length;
            const percentage = Math.round((completed / markers.length) * 100);
            document.getElementById('kpiCounts').innerText = `${completed} / ${markers.length} Holes Completed`;
            document.getElementById('kpiPercent').innerText = `${percentage}%`;
            document.getElementById('kpiProgressBar').style.width = `${percentage}%`;

            let totalDist = 0;
            list.innerHTML = markers.map((m, idx) => {
                const prev = idx > 0 ? markers[idx - 1] : null;
                const dist = prev ? calculateDistance(prev.lat, prev.lng, m.lat, m.lng) : null;
                if (dist) totalDist += dist;
                const isComplete = m.status === 'complete';
                const badge = isComplete ? 'bg-yellow-400 text-slate-950' : 'bg-slate-800 text-slate-400';
                
                return `
                    <div class="group relative flex flex-col bg-slate-900/50 border border-slate-800/50 p-5 rounded-3xl transition-all hover:border-slate-700 ${isComplete ? 'border-yellow-500/20 shadow-[0_0_15px_rgba(250,204,21,0.05)]' : ''}">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-[10px] transition-all shadow-inner ${badge}">${m.uniqueId}</div>
                                <div class="space-y-1">
                                    <p class="font-mono text-[11px] text-slate-300 tracking-tight leading-none">${m.lat.toFixed(5)}, ${m.lng.toFixed(5)}</p>
                                    <p class="${isComplete ? 'text-yellow-500' : 'text-slate-500'} text-[9px] uppercase font-black tracking-widest leading-tight">
                                        ${m.contractor ? `${m.contractor}` : 'UNASSIGNED'}
                                    </p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="toggleStatus('${m.id}', '${m.status}')" class="p-2 ${isComplete ? 'text-yellow-400 bg-yellow-400/10' : 'text-slate-500 hover:text-yellow-400 hover:bg-yellow-400/10'} rounded-xl transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                                <button onclick="deleteMarker('${m.id}')" class="p-2 text-slate-500 hover:text-red-400 rounded-xl opacity-0 group-hover:opacity-100 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg></button>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center gap-2">
                            <label class="text-[9px] font-black uppercase text-slate-600">Method</label>
                            <div class="flex bg-slate-950 rounded-lg p-1 border border-slate-800">
                                <button onclick="toggleDigMethod('${m.id}', 'M')" class="px-3 py-1 text-[10px] font-black rounded-md transition-all ${m.digMethod === 'M' ? (isComplete ? 'bg-yellow-400 text-slate-950' : 'bg-red-500 text-slate-950') : 'text-slate-500'}">M</button>
                                <button onclick="toggleDigMethod('${m.id}', 'B')" class="px-3 py-1 text-[10px] font-black rounded-md transition-all ${m.digMethod === 'B' ? (isComplete ? 'bg-yellow-400 text-slate-950' : 'bg-red-500 text-slate-950') : 'text-slate-500'}">B</button>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center justify-between pt-3 border-t border-slate-800/50">
                            <button onclick="triggerUpload('${m.id}')" class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-[10px] font-bold uppercase transition-all ${m.image ? 'bg-green-500/10 text-green-400' : 'bg-slate-800 text-slate-500'}">
                                ${m.image ? 'Media Ready' : 'Add Photo'}
                            </button>
                            ${dist ? `<span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">${dist.toFixed(2)} KM</span>` : ''}
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('maxDistLabel').innerText = totalDist.toFixed(2) + ' km';
        }

        function updateMapMarkers() {
            if (!googleMap) return;
            gMarkers.forEach(gm => gm.setMap(null));
            gMarkers = [];
            const bounds = new google.maps.LatLngBounds();
            markers.forEach((m, idx) => {
                const isComplete = m.status === 'complete';
                const pos = { lat: m.lat, lng: m.lng };
                let fillColor = isComplete ? "#facc15" : "#ef4444";
                const mapLabel = m.uniqueId.split('-').pop();

                const gMarker = new google.maps.Marker({
                    position: pos, map: googleMap,
                    label: { text: mapLabel, color: isComplete ? "black" : "white", fontWeight: "900", fontSize: "10px" },
                    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: fillColor, fillOpacity: 1, strokeWeight: 2, scale: 16 },
                    zIndex: 100 - idx
                });
                
                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="padding: 12px; min-width: 180px;">
                        ${m.image ? `<img src="${m.image}" style="width: 100%; border-radius: 8px; margin-bottom: 8px; max-height: 200px; object-fit: cover;">` : ''}
                        <div style="font-weight: 900; font-size: 16px;">${m.uniqueId}</div>
                        <p style="font-size: 11px; margin-top: 2px;">Contractor: <b>${m.contractor || 'Unassigned'}</b></p>
                        <p style="font-size: 11px; margin-top: 2px;">Community: ${m.community}</p>
                        <div style="font-size: 11px; color: #666; margin-top: 4px;">METHOD: ${m.digMethod === 'M' ? 'MANUAL' : 'BACKHOE'}</div>
                        <div style="font-size: 12px; color: #111; font-weight: bold; margin-top: 2px;">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</div></div>`
                });
                gMarker.addListener('click', () => infoWindow.open(googleMap, gMarker));
                gMarkers.push(gMarker);
                bounds.extend(pos);
            });
            if (markers.length > 0) googleMap.fitBounds(bounds);
        }

        const loadGMap = () => {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${googleMapsKey}&callback=initMap&libraries=geometry`;
            script.async = true;
            document.head.appendChild(script);
        };
        loadGMap();

    </script>
</body>
</html>
